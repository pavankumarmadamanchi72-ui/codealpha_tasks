<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FAQ Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel" aria-label="FAQ chatbot">
        <header class="chat-header">
          <div>
            <p class="eyebrow">ShopEase Support</p>
            <h1>FAQ Chatbot</h1>
          </div>
          <span class="status">Online</span>
        </header>

        <div id="messages" class="messages" aria-live="polite">
          <article class="message bot">
            <p>Hello. Ask me about orders, delivery, returns, payments, or account help.</p>
          </article>
        </div>

        <div class="faq-starters" aria-label="Basic FAQ questions">
          <section class="faq-category">
            <h2>Orders</h2>
            <button type="button" data-question="How do I check my order status?">How do I check my order status?</button>
            <button type="button" data-question="Can I cancel an order after placing it?">Can I cancel an order?</button>
            <button type="button" data-question="Can I change items in my order?">Can I change items?</button>
          </section>
          <section class="faq-category">
            <h2>Delivery</h2>
            <button type="button" data-question="How can I track my order?">How can I track my order?</button>
            <button type="button" data-question="How long does shipping take?">How long does shipping take?</button>
            <button type="button" data-question="What should I do if my delivery is delayed?">What if delivery is delayed?</button>
          </section>
          <section class="faq-category">
            <h2>Returns</h2>
            <button type="button" data-question="What is the return policy?">What is the return policy?</button>
            <button type="button" data-question="How do I start a return?">How do I start a return?</button>
            <button type="button" data-question="When will I receive my refund?">When will I receive my refund?</button>
          </section>
          <section class="faq-category">
            <h2>Payments</h2>
            <button type="button" data-question="Which payment methods are accepted?">Which payment methods are accepted?</button>
            <button type="button" data-question="Why did my payment fail?">Why did my payment fail?</button>
            <button type="button" data-question="Where can I download my invoice?">Where can I download my invoice?</button>
          </section>
          <section class="faq-category">
            <h2>Account Help</h2>
            <button type="button" data-question="How do I reset my password?">How do I reset my password?</button>
            <button type="button" data-question="How do I update my account information?">How do I update account info?</button>
            <button type="button" data-question="How do I contact customer support?">How do I contact support?</button>
          </section>
        </div>

        <form id="chat-form" class="chat-form">
          <label class="sr-only" for="question">Question</label>
          <input
            id="question"
            name="question"
            type="text"
            autocomplete="off"
            placeholder="Ask a question"
            required
          >
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
