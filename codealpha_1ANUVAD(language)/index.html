<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Translate - Premium Translation Tool</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-decor">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 8l6 6 6-6" />
                        <path d="M4 14h16" />
                        <path d="M2 22h20" />
                        <path d="M12 2v12" />
                    </svg>
                </div>
                <h1>ANUVAD</h1>
            </div>
            <p class="subtitle">Experience fast, intelligent translation with voice typing and synthesis.</p>
        </header>

        <!-- Main Translator Area -->
        <main class="translator-card">
            <!-- Source Card -->
            <div class="editor-section source-section">
                <div class="section-header">
                    <label for="source-lang" class="sr-only">Source Language</label>
                    <div class="select-wrapper">
                        <select id="source-lang" aria-label="Select Source Language">
                            <option value="auto" selected>Detect Language</option>
                            <!-- Global Languages -->
                            <option value="en">English</option>
                            <option value="es">Spanish (Español)</option>
                            <option value="fr">French (Français)</option>
                            <option value="de">German (Deutsch)</option>
                            <option value="it">Italian (Italiano)</option>
                            <option value="pt">Portuguese (Português)</option>
                            <option value="ru">Russian (Русский)</option>
                            <option value="zh-CN">Chinese (中文 - 简体)</option>
                            <option value="ja">Japanese (日本語)</option>
                            <option value="ko">Korean (한국어)</option>
                            <option value="ar">Arabic (العربية)</option>
                            <option value="tr">Turkish (Türkçe)</option>
                            <option value="nl">Dutch (Nederlands)</option>
                            <option value="pl">Polish (Polski)</option>
                            <option value="vi">Vietnamese (Tiếng Việt)</option>
                            <!-- Indian Languages -->
                            <option value="as">Assamese (অসমীয়া)</option>
                            <option value="bn">Bengali (বাংলা)</option>
                            <option value="brx">Bodo (बर')</option>
                            <option value="doi">Dogri (डोगरी)</option>
                            <option value="gu">Gujarati (ગુજરાતી)</option>
                            <option value="hi">Hindi (हिन्दी)</option>
                            <option value="kn">Kannada (ಕನ್ನಡ)</option>
                            <option value="ks">Kashmiri (कॉशुर)</option>
                            <option value="kok">Konkani (कोंकणी)</option>
                            <option value="mai">Maithili (मैथिली)</option>
                            <option value="ml">Malayalam (മലയാളം)</option>
                            <option value="mni-Mtei">Manipuri (মৈতৈলোন্)</option>
                            <option value="mr">Marathi (मराठी)</option>
                            <option value="ne">Nepali (नेपाली)</option>
                            <option value="or">Odia (ଓଡ଼ିଆ)</option>
                            <option value="pa">Punjabi (ਪੰਜਾਬੀ)</option>
                            <option value="sa">Sanskrit (संस्कृतम्)</option>
                            <option value="sat">Santali (संताली)</option>
                            <option value="sd">Sindhi (सिंधी)</option>
                            <option value="ta">Tamil (தமிழ்)</option>
                            <option value="te">Telugu (తెలుగు)</option>
                            <option value="ur">Urdu (اُردُو)</option>
                        </select>
                        <span class="select-arrow">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </span>
                    </div>
                    
                    <button id="clear-btn" class="icon-btn tooltip" data-tooltip="Clear text" aria-label="Clear source text">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="textarea-container">
                    <textarea id="source-text" placeholder="Type or paste text here..." maxlength="5000" aria-label="Source text to translate"></textarea>
                    <div class="detected-badge" id="detected-badge" style="display: none;"></div>
                </div>

                <div class="section-footer">
                    <div class="footer-left">
                        <button id="voice-input-btn" class="icon-btn speech-btn tooltip" data-tooltip="Voice typing" aria-label="Start voice input">
                            <svg class="mic-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                            <span class="pulse-ring"></span>
                        </button>
                    </div>
                    <div class="char-counter"><span id="char-count">0</span> / 5000</div>
                </div>
            </div>

            <!-- Mid Controls -->
            <div class="middle-controls">
                <button id="swap-btn" class="swap-button tooltip" data-tooltip="Swap languages" aria-label="Swap source and target languages">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                </button>
                
                <div class="auto-translate-toggle">
                    <label class="switch-container">
                        <input type="checkbox" id="auto-translate" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label">Auto</span>
                </div>
            </div>

            <!-- Target Card -->
            <div class="editor-section target-section">
                <div class="section-header">
                    <label for="target-lang" class="sr-only">Target Language</label>
                    <div class="select-wrapper">
                        <select id="target-lang" aria-label="Select Target Language">
                            <!-- Global Languages -->
                            <option value="en">English</option>
                            <option value="es" selected>Spanish (Español)</option>
                            <option value="fr">French (Français)</option>
                            <option value="de">German (Deutsch)</option>
                            <option value="it">Italian (Italiano)</option>
                            <option value="pt">Portuguese (Português)</option>
                            <option value="ru">Russian (Русский)</option>
                            <option value="zh-CN">Chinese (中文 - 简体)</option>
                            <option value="ja">Japanese (日本語)</option>
                            <option value="ko">Korean (한국어)</option>
                            <option value="ar">Arabic (العربية)</option>
                            <option value="tr">Turkish (Türkçe)</option>
                            <option value="nl">Dutch (Nederlands)</option>
                            <option value="pl">Polish (Polski)</option>
                            <option value="vi">Vietnamese (Tiếng Việt)</option>
                            <!-- Indian Languages -->
                            <option value="as">Assamese (অসমীয়া)</option>
                            <option value="bn">Bengali (বাংলা)</option>
                            <option value="brx">Bodo (बर')</option>
                            <option value="doi">Dogri (डोगरी)</option>
                            <option value="gu">Gujarati (ગુજરાતી)</option>
                            <option value="hi">Hindi (हिन्दी)</option>
                            <option value="kn">Kannada (ಕನ್ನಡ)</option>
                            <option value="ks">Kashmiri (कॉशुर)</option>
                            <option value="kok">Konkani (कोंकणी)</option>
                            <option value="mai">Maithili (मैथिली)</option>
                            <option value="ml">Malayalam (മലയാളം)</option>
                            <option value="mni-Mtei">Manipuri (মৈতৈলোন্)</option>
                            <option value="mr">Marathi (मराठी)</option>
                            <option value="ne">Nepali (नेपाली)</option>
                            <option value="or">Odia (ଓଡ଼ିଆ)</option>
                            <option value="pa">Punjabi (ਪੰਜਾਬੀ)</option>
                            <option value="sa">Sanskrit (संस्कृतम्)</option>
                            <option value="sat">Santali (संताली)</option>
                            <option value="sd">Sindhi (सिंधी)</option>
                            <option value="ta">Tamil (தமிழ்)</option>
                            <option value="te">Telugu (తెలుగు)</option>
                            <option value="ur">Urdu (اُردُو)</option>
                        </select>
                        <span class="select-arrow">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </span>
                    </div>
                </div>

                <div class="textarea-container">
                    <div class="translation-loader" id="loader">
                        <div class="spinner"></div>
                    </div>
                    <div id="target-text" class="target-display placeholder-text" tabindex="0" aria-label="Translated output">Translation will appear here...</div>
                </div>

                <div class="section-footer">
                    <div class="footer-left">
                        <button id="tts-btn" class="icon-btn tooltip" data-tooltip="Listen" aria-label="Listen to translation" disabled>
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                            </svg>
                        </button>
                        <button id="copy-btn" class="icon-btn tooltip" data-tooltip="Copy" aria-label="Copy translated text" disabled>
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Manual Translate Button (Sticky / Bottom Panel) -->
        <div class="action-panel">
            <button id="translate-btn" class="primary-btn">
                <span>Translate</span>
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>

        <!-- History Panel -->
        <section class="history-section card-glass">
            <div class="history-header">
                <h2>
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    Recent Translations
                </h2>
                <button id="clear-history-btn" class="text-btn" aria-label="Clear all translation history">Clear All</button>
            </div>
            <div class="history-list-wrapper">
                <ul id="history-list" class="history-list">
                    <!-- History items will be inserted here dynamically -->
                    <li class="history-empty">No recent translations</li>
                </ul>
            </div>
        </section>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
        <span class="toast-icon" id="toast-icon"></span>
        <span id="toast-message" class="toast-message"></span>
    </div>

    <script src="app.js"></script>
</body>
</html>
